<title>דוח סיור הנדסי | אהוד לויתן הנדסה</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<style>
  :root {
    --blue-deep: #0f2556;
    --blue-mid: #1a3a8f;
    --blue-accent: #2563eb;
    --red-brand: #c0392b;
    --gray-light: #f8fafc;
    --border: #e2e8f0;
  }
  * { box-sizing: border-box; }
  body { font-family: 'Heebo', sans-serif; background: #eef2f7; margin: 0; }

  /* APP STYLES */
  .card { background: white; border-radius: 14px; padding: 18px; margin-bottom: 14px; box-shadow: 0 2px 12px rgba(15,37,86,.08); border: 1px solid var(--border); }
  .tab-active { border-bottom: 3px solid var(--blue-accent); color: var(--blue-deep); font-weight: 800; }
  input, select, textarea { border: 1.5px solid var(--border); border-radius: 8px; padding: 10px 12px; width: 100%; font-size: 14px; font-family: 'Heebo', sans-serif; background: #fff; transition: border-color .2s; outline: none; }
  input:focus, select:focus, textarea:focus { border-color: var(--blue-accent); }
  .btn-sm { font-size: 12px; padding: 5px 12px; border-radius: 6px; font-weight: 700; cursor: pointer; }
  .chip { padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; border: 1.5px solid var(--border); background: #fff; color: #64748b; cursor: pointer; transition: all .15s; }
  .chip.active { background: var(--blue-accent); color: #fff; border-color: var(--blue-accent); }
  .img-preview { width: 64px; height: 64px; object-fit: cover; border-radius: 8px; border: 1.5px solid var(--border); }
  .section-label { font-size: 11px; font-weight: 700; color: #94a3b8; letter-spacing: .5px; text-transform: uppercase; margin-bottom: 5px; display: block; }
  button { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
  input, select, textarea { -webkit-appearance: none; font-size: 16px !important; }
  @media (max-width: 480px) {
    .card { padding: 14px 12px; }
    .btn-sm { font-size: 11px; padding: 6px 10px; }
    .chip { padding: 8px 12px; font-size: 13px; min-height: 36px; }
  }
</style>
</head>

/* ---- SUPABASE HELPERS ---- */
const dbLoad = async () => {
  try {
    const { data, error } = await supabase
      .from('reports')
      .select('*');
    if (error) throw error;
    return data || [];
  } catch(e) {
    console.error('Load error:', e);
    return [];
  }
};

const dbSave = async (record) => {
  try {
    const { error } = await supabase
      .from('reports')
      .insert([{ data: record }]);
    if (error) throw error;
    return true;
  } catch(e) {
    console.error('Save error:', e);
    return false;
  }
};

const dbDelete = async (supabaseId) => {
  try {
    const { error } = await supabase
      .from('reports')
      .delete()
      .eq('id', supabaseId);
    if (error) throw error;
    return true;
  } catch(e) {
    console.error('Delete error:', e);
    return false;
  }
};

const dbUpdate = async (supabaseId, record) => {
  try {
    const { error } = await supabase
      .from('reports')
      .update({ data: record })
      .eq('id', supabaseId);
    if (error) throw error;
    return true;
  } catch(e) {
    console.error('Update error:', e);
    return false;
  }
};

const compressImage = (file, callback) => {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      const ctx = canvas.getContext('2d');
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      callback(canvas.toDataURL('image/jpeg', 0.6));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
};

const APP_PASSWORD = 'GoodDay';

function PasswordScreen({onSuccess}) {
  const [pwd, setPwd] = React.useState('');
  const [error, setError] = React.useState(false);
  const check = () => {
    if(pwd === APP_PASSWORD) { onSuccess(); }
    else { setError(true); setPwd(''); setTimeout(()=>setError(false),2000); }
  };
  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0f2556,#1a3a8f)",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{background:"#fff",borderRadius:16,padding:"36px 28px",width:300,textAlign:"center",boxShadow:"0 8px 32px rgba(0,0,0,.3)"}}>
        <img src={LOGO_B64} style={{height:60,marginBottom:16,borderRadius:8,padding:6,background:"#0f2556"}} />
        <div style={{fontSize:18,fontWeight:800,color:"#0f2556",marginBottom:4}}>דוח סיור הנדסי</div>
        <div style={{fontSize:12,color:"#64748b",marginBottom:24}}>אהוד לויתן הנדסה</div>
        <input
          type="password"
          value={pwd}
          onChange={e=>setPwd(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&check()}
          placeholder="סיסמה"
          style={{textAlign:"center",marginBottom:12,fontSize:18,letterSpacing:4,border:`1.5px solid ${error?"#dc2626":"#e2e8f0"}`,background:error?"#fef2f2":"#fff"}}
        />
        {error && <div style={{color:"#dc2626",fontSize:13,fontWeight:700,marginBottom:8}}>סיסמה שגויה</div>}
        <button onClick={check}

    </div>
  );

      body += `<table cellpadding="5" cellspacing="0" style="border-collapse:collapse;">`;
      tourData.contractors.forEach(c => {
        body += `<tr><td style="border:1px solid #bfdbfe; background:#dbeafe; color:#1e40af; padding:4px 14px; font-size:13px; font-weight:600;">${c.name} — ${c.role}</td></tr>`;
      });
      body += `</table>`;
    }
    body += `</div>`;

    /* ── SECTION 3: EQUIPMENT ── */
    const eq = Object.entries(tourData.equipment||{}).filter(([,v])=>v);
    const eqOther = Array.isArray(tourData.equipmentOther) ? tourData.equipmentOther : [];
    
    if (eq.length || eqOther.length > 0) {
      body += `
        <div style="margin-bottom:22px;">
          <p style="font-size:16px; font-weight:800; color:#0f2556; margin:0 0 10px 0; border-right:4px solid #2563eb; padding-right:10px;">3. ציוד מכני</p>
          <table width="100%" cellpadding="8" cellspacing="0" style="border-collapse:collapse;">
            ${eq.map(([k,v],i)=>`
              <tr style="${i%2===0?'background:#f8fafc;':''}">
                <td style="border:1px solid #e2e8f0; font-weight:700; color:#374151; width:200px;">${k}</td>
                <td style="border:1px solid #e2e8f0; color:#1e293b;">${v} יח'</td>
              </tr>
            `).join('')}
            ${eqOther.map(e => `<tr><td style="border:1px solid #e2e8f0; font-weight:700; color:#374151;">${e.name || 'אחר'}</td><td style="border:1px solid #e2e8f0; color:#1e293b;">${e.count || 0} יח'</td></tr>`).join('')}
          </table>
        </div>
      `;
    }

    /* ── SECTION 5: CONTRACT VIOLATIONS & FINES ── */
    const viols = tourData.viols || [];
    if (viols.length > 0) {
      const totalFine = viols.reduce((s,v)=>s+v.fine,0);
      body += `
        <div style="margin-bottom:22px;">
          <p style="font-size:16px; font-weight:800; color:#374151; margin:0 0 10px 0; border-right:4px solid #6b7280; padding-right:10px;">5. קנסות לליקויים שנמצאו בסיור לפי סעיפים חוזיים</p>
          <table width="100%" cellpadding="8" cellspacing="0" style="border-collapse:collapse; width:100%; font-family:Arial,sans-serif; font-size:13px;">
            <tr style="background:#f9fafb;">
              <th style="border:1px solid #d1d5db; text-align:center; color:#374151; font-size:12px; width:30px;">#</th>
              <th style="border:1px solid #d1d5db; text-align:right; color:#374151; font-size:12px; width:22%;">ליקוי</th>
              <th style="border:1px solid #d1d5db; text-align:right; color:#374151; font-size:12px; width:15%;">הערה</th>
              <th style="border:1px solid #d1d5db; text-align:center; color:#374151; font-size:12px; width:58px;">קנס (₪)</th>
              <th style="border:1px solid #d1d5db; text-align:center; color:#374151; font-size:12px; width:43%;">תמונה</th>
            </tr>
      `;
      viols.forEach((v, i) => {
        const bg = i % 2 === 0 ? '#ffffff' : '#f9fafb';
        body += `
          <tr style="background:${bg}; vertical-align:top;">
            <td style="border:1px solid #e5e7eb; text-align:center; font-weight:700; color:#6b7280;">${i+1}</td>
            <td style="border:1px solid #e5e7eb; font-weight:700; color:#1e293b;">${v.label}</td>
            <td style="border:1px solid #e5e7eb; color:#475569; white-space:pre-wrap;">${toHtml(v.note)}</td>
            <td style="border:1px solid #e5e7eb; text-align:center; font-weight:800; color:#374151;">₪${fmtNum(v.fine)}</td>
            <td style="border:1px solid #e5e7eb; text-align:center; width:43%;">
              ${v.image ? `<img src="${v.image}" style="max-width:100%; width:100%; height:auto; display:block; margin:4px auto; object-fit:contain; image-rendering:high-quality;" />` : '<span style="color:#94a3b8; font-size:12px;">אין תמונה</span>'}
            </td>
          </tr>
        `;
      });
      body += `
            <tr style="background:#f3f4f6;">
              <td colspan="5" style="border:1px solid #d1d5db; padding:10px 16px; color:#374151; font-weight:800; font-size:14px; text-align:center;">סה&quot;כ קנסות לדוח זה: &nbsp;₪${fmtNum(totalFine)}</td>
            </tr>
          </table>
        </div>
      `;
    } else {
      body += `
        <div style="margin-bottom:22px;">
          <p style="font-size:16px; font-weight:800; color:#374151; margin:0 0 10px 0; border-right:4px solid #6b7280; padding-right:10px;">5. קנסות לליקויים שנמצאו בסיור לפי סעיפים חוזיים</p>
          <div style="background:#f9fafb; border:1.5px solid #d1d5db; border-radius:8px; padding:14px 18px; color:#6b7280; font-weight:600;">
            ✅ לא נצפו ממצאים אשר בגינם צפוי להתקבל קנס
          </div>
        </div>
      `;
    }
  }

  const footer = `
    <div style="direction:rtl; margin-top:36px; padding-top:20px; text-align:right; padding-right:24px;">
      <div style="display:inline-block; text-align:right;">
        <div style="font-size:12px; font-weight:700; color:#374151; margin-bottom:10px;">שם עורך הדוח:</div>
        <div style="border-bottom:1.5px solid #94a3b8; width:220px; margin-bottom:20px; height:22px;"></div>
        <div style="font-size:12px; font-weight:700; color:#374151; margin-bottom:4px;">חתימה:</div>
        <div style="border-bottom:1.5px solid #94a3b8; width:220px; margin-bottom:8px; height:36px;"></div>
      </div>
    </div>
    <hr style="border:none; border-top:3px solid #0f2556; margin:24px 0 10px 0;" />
    <table width="100%" cellpadding="0" cellspacing="0" style="font-size:11px; color:#94a3b8;">
      <tr>
        <td style="text-align:right;">דוח זה הופק בידי אהוד לויתן הנדסה</td>
        <td style="text-align:left;">www.leviathan-eng.co.il</td>
      </tr>
    </table>
    </div>
  `;

  return header + body + footer;
};

  contractors:[],

});

       MAIN APP

}

  const rmContractor = i => setTourData(p=>{const c=[...p.contractors]; c.splice(i,1); return{...p,contractors:c};});

  const updOtherEq = (i,f,v) => setTourData(p=>{const c=[...p.equipmentOther]; c[i][f]=v; return{...p,equipmentOther:c};});
  const rmOtherEq = i => setTourData(p=>{const c=[...p.equipmentOther]; c.splice(i,1); return{...p,equipmentOther:c};});

  const addViol = (item, type) => {
    const fine = type==='h'?item.h:item.o;
    setTourData(p=>({...p, viols:[...p.viols,{id:uid(),label:item.label,fine,note:"",image:null}]}));

  };
  const updateViol = (id,field,val) => setTourData(p=>({...p, viols:p.viols.map(v=>v.id===id?{...v,[field]:val}:v)}));
  const handleImageUpload = (id,e) => { if(e.target.files?.[0]) compressImage(e.target.files[0], b=>updateViol(id,'image',b)); };
  const tourTotal = useMemo(()=>tourData.viols.reduce((a,c)=>a+(c.fine||0),0),[tourData.viols]);

  const saveTour = async () => {
    if (editingReport) {
      // מצב עריכה — עדכון דוח קיים
      const updatedData = {...editingReport, data:{...tourData}};
      const supabaseId = editingReport._supabase_id || editingReport._id;
      console.log('Updating with ID:', supabaseId);
      const ok = await dbUpdate(supabaseId, updatedData);
      if (ok) {
        setHistory(p => p.map(h => h._id===editingReport._id ? {...updatedData, _id:editingReport._id} : h));
        setEditingReport(null);
        setTourData(emptyTour());
        setTab('archive');
        alert("השינויים נשמרו! ✅");
      } else {
        alert("שגיאה בשמירה — בדוק חיבור אינטרנט");
      }
    } else {
      // מצב חדש — שמירה רגילה
      const rec = {id:uid(), type:'tour', section, date:tourData.date, time:tourData.time, data:{...tourData}};
      const ok = await dbSave(rec);
      if (ok) {
        setHistory(p=>[rec,...p]);
        setTourData(emptyTour());
        alert("הסיור נשמר בענן! ✅");
      } else {
        alert("שגיאה בשמירה — בדוק חיבור אינטרנט");
      }
    }
  };
  const saveMeeting = async (m) => {
    const rec = {id:uid(), type:'meeting', section, ...m};
    const ok = await dbSave(rec);
    if (ok) {
      setMeetings(p=>[rec,...p]);
      setHistory(p=>[rec,...p]);
    } else {
      alert("שגיאה בשמירה — בדוק חיבור אינטרנט");
    }
  };

  const deleteReport = async (h) => {
    if(!confirm(`למחוק את הדוח של מקטע ${h.section} מתאריך ${h.date}?`)) return;
    const supabaseId = h._supabase_id || h._id;
    const ok = await dbDelete(supabaseId);
    if(ok) {
      setHistory(p => p.filter(r => r._id !== h._id));
      setSelectedReport(null);
      alert("הדוח נמחק ✅");
    } else {
      alert("שגיאה במחיקה");
    }
  };
  const doExportSingle = async (item) => {
    const rawDate = item.date || '';
    const fnameDatePart = rawDate.includes('-')
      ? (() => { const [y,m,d] = rawDate.split('-'); return `${d}-${m}-${y}`; })()
      : todayStr().replace(/\//g,'-');
    const fname = `Blue-Line-${item.section}_${fnameDatePart}`;
    const bodyContent = buildReportHTML(item.data||item, item.section||section, item.type==='meeting');
    const fullHTML = '<!DOCTYPE html><html lang="he" dir="rtl"><head><meta charset="utf-8"><style>body{font-family:Arial,Helvetica,sans-serif;direction:rtl;margin:20px;background:#fff;font-size:12pt;}table{border-collapse:collapse;}img{max-width:95%;width:auto;height:auto;display:block;object-fit:contain;}@media print{body{margin:0;}}</style></head><body>' + bodyContent + '</body></html>';
    const blob = new Blob([fullHTML], {type:'text/html;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = fname + '.html';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 3000);
  };

  const doExport = async (all=false) => {
    const items = all ? history : [{type:'tour', section, date:tourData.date, time:tourData.time, data:tourData}];
    if(items.length===0) return alert("אין נתונים לייצוא");
    const rawDate = tourData.date || '';
    const fnameDatePart = rawDate.includes('-')
      ? (() => { const [y,m,d] = rawDate.split('-'); return `${d}-${m}-${y}`; })()
      : todayStr().replace(/\//g,'-');
    const fname = `Blue-Line-${section}_${fnameDatePart}`;
    const buildAll = () => items.map(d=>buildReportHTML(d.data||d, d.section||section, d.type==='meeting')).join('<div style="page-break-before:always;margin-top:40px;"></div>');

    /* Loading overlay */
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(15,37,86,0.75);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;color:#fff;font-family:Heebo,sans-serif;';
    overlay.innerHTML = '<div style="font-size:48px;margin-bottom:16px">⏳</div><div style="font-size:18px;font-weight:700">מכין את הדוח...</div>';
    document.body.appendChild(overlay);

    try {
      const bodyContent = buildAll();
      const fullHTML = '<!DOCTYPE html><html lang="he" dir="rtl"><head><meta charset="utf-8"><style>body{font-family:Arial,Helvetica,sans-serif;direction:rtl;margin:20px;background:#fff;font-size:12pt;}table{border-collapse:collapse;}img{max-width:95%;width:auto;height:auto;display:block;object-fit:contain;image-rendering:high-quality;}@media print{body{margin:0;}}</style></head><body>' + bodyContent + '</body></html>';

      /* Android Capacitor path */
      if (window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform()) {
        const { Filesystem, Share } = window.Capacitor.Plugins;
        const b64 = btoa(unescape(encodeURIComponent(fullHTML)));
        await Filesystem.writeFile({ path: fname + '.html', data: b64, directory: 'CACHE', recursive: true });
        const { uri } = await Filesystem.getUri({ directory: 'CACHE', path: fname + '.html' });
        document.body.removeChild(overlay);
        await Share.share({ title: 'דוח סיור — ' + fname, text: 'דוח הנדסי', url: uri, dialogTitle: 'שתף את הדוח' });
        return;
      }

      /* Browser fallback */
      document.body.removeChild(overlay);
      const blob = new Blob([fullHTML], {type:'text/html;charset=utf-8'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = fname + '.html';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 3000);

    } catch(err) {
      if(document.body.contains(overlay)) document.body.removeChild(overlay);
      console.error('Export error:', err);
      alert('שגיאה: ' + (err && err.message ? err.message : String(err)));
    }
  };

  const TABS = [{id:"status",label:"🏗️ סטטוס שטח"},{id:"violations",label:"🦺 ליקויים"},{id:"meetings",label:"📝 ישיבות"},{id:"archive",label:"📁 ארכיון"},{id:"stats",label:"📊 סטטיסטיקה"}];

  return (
    <div style={{minHeight:"100vh",paddingBottom:90}}>

      <header style={{background:"linear-gradient(135deg,#0f2556,#1a3a8f)",color:"#fff",padding:"14px 18px",display:"flex",justifyContent:"space-between",alignItems:"center",boxShadow:"0 4px 20px rgba(15,37,86,.4)"}}>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <img src={LOGO_B64} alt="לוגו" style={{height:52,background:"#fff",borderRadius:8,padding:6}} />
          <div>
            <div style={{fontSize:18,fontWeight:900,lineHeight:1.1}}>דוח סיור הנדסי</div>
            <div style={{fontSize:11,color:"#93c5fd",marginTop:2}}>אהוד לויתן הנדסה — פיקוח ובקרה</div>
          </div>
        </div>
      </header>

      {loading && (
        <div style={{textAlign:"center",padding:"40px 0",color:"#2563eb",fontWeight:700,fontSize:16}}>

          <span style={{fontWeight:700,fontSize:13,color:"#92400e"}}>✏️ מצב עריכה — מקטע {editingReport.section} | {editingReport.date}</span>
          <button onClick={()=>{setEditingReport(null);setTourData(emptyTour());setTab('archive');}}
            style={{background:"#dc2626",color:"#fff",border:"none",borderRadius:6,padding:"4px 12px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>
            בטל עריכה
          </button>
        </div>
      )}

      {/* TABS */}
      <div style={{display:"flex",background:"#fff",boxShadow:"0 2px 8px rgba(0,0,0,.06)",overflowX:"auto",position:"sticky",top:0,zIndex:50}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)}
            style={{flex:1,padding:"13px 8px",fontSize:13,fontWeight:700,fontFamily:"Heebo,sans-serif",border:"none",borderBottom:`3px solid ${tab===t.id?'#2563eb':'transparent'}`,color:tab===t.id?'#0f2556':'#64748b',background:"#fff",cursor:"pointer",whiteSpace:"nowrap",transition:"all .15s"}}>
            {t.label}
          </button>
        ))}
      </div>

      <div style={{maxWidth:680,margin:"0 auto",padding:"14px 12px"}}>
        {/* SECTION CHIPS */}
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
          {SECTIONS.map(s=><button key={s} className={`chip ${section===s?"active":""}`} onClick={()=>setSection(s)}>{s}</button>)}
        </div>

        {/* ── TAB: STATUS ── */}
        {tab==="status" && (
          <div>
            <div className="card">
              <div style={{fontWeight:800,color:"#0f2556",marginBottom:14,fontSize:15,borderBottom:"1.5px solid #e2e8f0",paddingBottom:10}}>📋 פרטי הדוח והמיקום</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
                <div><span className="section-label">תאריך</span><input type="date" value={tourData.date} onChange={e=>setTourData(p=>({...p,date:e.target.value}))} /></div>
                <div><span className="section-label">שעה</span><input type="time" value={tourData.time} onChange={e=>setTourData(p=>({...p,time:e.target.value}))} /></div>
              </div>
              <div style={{marginBottom:12}}><span className="section-label">מיקום / מס' חתך</span><input value={tourData.location} onChange={e=>setTourData(p=>({...p,location:e.target.value}))} placeholder="הזן מיקום..." /></div>
              {/* ── DYNAMIC WALL TEXT BOXES WITH EMBEDDED DEFECTS ── */}
              <div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <span className="section-label" style={{marginBottom:0}}>דפנות / תיאורי עבודה</span>

                      <button key={w} onClick={()=>{
                        if(!(tourData.wallDescs||{})[w]) setTourData(p=>({...p,wallDescs:{...(p.wallDescs||{}),[w]:{desc:"",defects:[]}}}));
                      }} style={{fontSize:11,padding:"4px 10px",background:(tourData.wallDescs||{})[w]!==undefined?"#2563eb":"#e2e8f0",color:(tourData.wallDescs||{})[w]!==undefined?"#fff":"#475569",border:"none",borderRadius:6,cursor:"pointer",fontWeight:700,fontFamily:"Heebo,sans-serif"}}>

                </div>

                  <div style={{background:"#f8fafc",border:"1px dashed #cbd5e1",borderRadius:8,padding:"12px 14px",fontSize:13,color:"#94a3b8",textAlign:"center"}}>
                    לחץ על דופן להוספת תיבת טקסט נפרדת לכל דופן
                  </div>
                )}
                {Object.entries(tourData.wallDescs||{}).map(([wallName, wallData])=>{
                  const desc = typeof wallData === 'string' ? wallData : (wallData.desc||'');
                  const defects = typeof wallData === 'object' ? (wallData.defects||[]) : [];
                  const setWallDesc = (newDesc) => setTourData(p=>({...p,wallDescs:{...(p.wallDescs||{}),[wallName]:{desc:newDesc,defects}}}));

                    const wd = p.wallDescs||{};
                    const existing = wd[wallName]||{desc:'',defects:[]};
                    return {...p,wallDescs:{...wd,[wallName]:{...existing,defects:[...(existing.defects||[]),{id:uid(),note:"",image:null,contractorNotified:false}]}}};

                  const updateDefect = (did,field,val) => setTourData(p=>{
                    const wd = p.wallDescs||{};
                    const existing = wd[wallName]||{desc:'',defects:[]};
                    return {...p,wallDescs:{...wd,[wallName]:{...existing,defects:(existing.defects||[]).map(d=>d.id===did?{...d,[field]:val}:d)}}};

                  const removeDefect = (did) => setTourData(p=>{
                    const wd = p.wallDescs||{};
                    const existing = wd[wallName]||{desc:'',defects:[]};
                    return {...p,wallDescs:{...wd,[wallName]:{...existing,defects:(existing.defects||[]).filter(d=>d.id!==did)}}};
                  });
                  const handleDefectImage = (did,e) => { if(e.target.files?.[0]) compressImage(e.target.files[0], b=>updateDefect(did,'image',b)); };
                  return (
                  <div key={wallName} style={{marginBottom:12,background:"#f8fafc",borderRadius:10,border:"1.5px solid #bfdbfe",overflow:"hidden"}}>
                    {/* Wall header */}
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",background:"#dbeafe",borderBottom:"1px solid #bfdbfe"}}>
                      <span style={{fontWeight:800,fontSize:14,color:"#1e40af"}}>📐 {wallName}</span>
                      <button onClick={()=>setTourData(p=>{const d={...(p.wallDescs||{})};delete d[wallName];return{...p,wallDescs:d};})} style={{background:"#fee2e2",color:"#dc2626",border:"none",borderRadius:6,padding:"3px 8px",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"Heebo,sans-serif"}}>✕ הסר</button>
                    </div>
                    {/* Work description */}
                    <div style={{padding:"10px 12px",borderBottom:"1px solid #e2e8f0"}}>
                      <span className="section-label">תיאור עבודה</span>
                      <textarea value={desc} onChange={e=>setWallDesc(e.target.value)} rows={3} placeholder={`תיאור עבודה — ${wallName}...`} style={{whiteSpace:"pre-wrap"}} />
                    </div>
                    {/* Execution defects section */}
                    <div style={{padding:"10px 12px",background:"#fffbeb"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:defects.length>0?10:0}}>
                        <span style={{fontWeight:700,fontSize:12,color:"#92400e"}}>⚠️ ליקויים בביצוע ({defects.length})</span>
                        <button onClick={addDefect} style={{background:"#f59e0b",color:"#fff",border:"none",borderRadius:6,padding:"4px 10px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>+ הוסף ליקוי</button>
                      </div>
                      {defects.map((d,di)=>(
                        <div key={d.id} style={{background:"#fff",borderRadius:8,padding:10,marginBottom:8,border:"1px solid #fcd34d"}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                            <span style={{fontWeight:700,fontSize:12,color:"#78350f"}}>ליקוי #{di+1}</span>
                            <button onClick={()=>removeDefect(d.id)} style={{background:"#fee2e2",color:"#dc2626",border:"none",borderRadius:5,padding:"2px 7px",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"Heebo,sans-serif"}}>✕</button>
                          </div>
                          <span className="section-label">נא לתאר את הליקוי בפירוט - יש לצרף תמונה</span>
                          <textarea value={d.note} onChange={e=>updateDefect(d.id,'note',e.target.value)} rows={2} placeholder="תאר: סוג הליקוי, מיקום מדויק, היקף..." style={{marginBottom:8,fontSize:13}} />
                          {/* Contractor notified toggle */}
                          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,padding:"6px 10px",background:"#f0fdf4",borderRadius:6,border:"1px solid #bbf7d0"}}>
                            <input type="checkbox" id={`cn-${d.id}`} checked={!!d.contractorNotified} onChange={e=>updateDefect(d.id,'contractorNotified',e.target.checked)} style={{width:18,height:18,cursor:"pointer",accentColor:"#16a34a"}} />
                            <label htmlFor={`cn-${d.id}`} style={{fontSize:12,fontWeight:700,color:"#15803d",cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>
                              יש לציין האם נציג קבלן עודכן בשטח
                            </label>
                            {d.contractorNotified && <span style={{fontSize:11,color:"#16a34a",fontWeight:800}}>✓ עודכן</span>}
                          </div>
                          {/* Photo buttons */}
                          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                            <label htmlFor={`dcam-${d.id}`} style={{background:"#e2e8f0",color:"#475569",padding:"5px 12px",borderRadius:7,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>📷 מצלמה</label>
                            <label htmlFor={`dgal-${d.id}`} style={{background:"#fef3c7",color:"#92400e",padding:"5px 12px",borderRadius:7,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>🖼️ גלריה</label>
                            <input type="file" accept="image/*" capture="environment" onChange={e=>handleDefectImage(d.id,e)} style={{display:"none"}} id={`dcam-${d.id}`} />
                            <input type="file" accept="image/*" onChange={e=>handleDefectImage(d.id,e)} style={{display:"none"}} id={`dgal-${d.id}`} />
                            {d.image && <img src={d.image} style={{width:56,height:56,objectFit:"cover",borderRadius:6,border:"1.5px solid #fcd34d"}} />}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                  );
                })}
              </div>
            </div>

            <div className="card">
              <div style={{fontWeight:800,color:"#0f2556",marginBottom:14,fontSize:15,borderBottom:"1.5px solid #e2e8f0",paddingBottom:10}}>👷 כוח אדם ונוכחות קבלן</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
                {Object.keys(tourData.manpower).map(k=>(
                  <div key={k}><span className="section-label">{k}</span><input type="number" min="0" value={tourData.manpower[k]} onChange={e=>setTourData(p=>({...p,manpower:{...p.manpower,[k]:e.target.value}}))} /></div>
                ))}
              </div>
              <div style={{background:"#f8fafc",padding:12,borderRadius:10,border:"1px solid #e2e8f0"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <span style={{fontWeight:700,fontSize:13,color:"#374151"}}>נוכחות קבלן</span>
                  <button onClick={addContractor} style={{background:"#2563eb",color:"#fff",border:"none",borderRadius:6,padding:"5px 12px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>+ הוסף נציג</button>
                </div>
                {tourData.contractors.map((c,i)=>(
                  <div key={i} style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
                    <input value={c.name} onChange={e=>updContractor(i,'name',e.target.value)} placeholder="שם הנציג" style={{flex:1}} />
                    <input value={c.role} onChange={e=>updContractor(i,'role',e.target.value)} placeholder="תפקיד" style={{flex:1}} />
                    <button onClick={()=>rmContractor(i)} style={{background:"#fee2e2",color:"#dc2626",border:"none",borderRadius:6,padding:"6px 10px",cursor:"pointer",fontWeight:700,fontFamily:"Heebo,sans-serif"}}>✕</button>
                  </div>
                ))}
              </div>
            </div>

            <div className="card">
              <div style={{fontWeight:800,color:"#0f2556",marginBottom:14,fontSize:15,borderBottom:"1.5px solid #e2e8f0",paddingBottom:10}}>🚜 ציוד מכני</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
                {Object.keys(tourData.equipment).map(k=>(
                  <div key={k}><span className="section-label">{k}</span><input type="number" min="0" value={tourData.equipment[k]} onChange={e=>setTourData(p=>({...p,equipment:{...p.equipment,[k]:e.target.value}}))} /></div>
                ))}
              </div>
              
              <div style={{background:"#f8fafc",padding:12,borderRadius:10,border:"1px solid #e2e8f0",marginTop:12}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <span style={{fontWeight:700,fontSize:13,color:"#374151"}}>כלים נוספים (אחר)</span>
                  <button onClick={addOtherEq} style={{background:"#2563eb",color:"#fff",border:"none",borderRadius:6,padding:"5px 12px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>+ הוסף כלי</button>
                </div>
                {(tourData.equipmentOther || []).map((eq,i)=>(
                  <div key={i} style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
                    <input value={eq.name} onChange={e=>updOtherEq(i,'name',e.target.value)} placeholder="שם הכלי" style={{flex:2}} />
                    <input type="number" min="0" value={eq.count} onChange={e=>updOtherEq(i,'count',e.target.value)} placeholder="כמות" style={{flex:1}} />
                    <button onClick={()=>rmOtherEq(i)} style={{background:"#fee2e2",color:"#dc2626",border:"none",borderRadius:6,padding:"6px 10px",cursor:"pointer",fontWeight:700,fontFamily:"Heebo,sans-serif"}}>✕</button>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* ── TAB: VIOLATIONS ── */}
        {tab==="violations" && (
          <div>
            <div style={{background:"#eff6ff",border:"1.5px solid #bfdbfe",borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:13,fontWeight:600,color:"#1e40af",textAlign:"center"}}>
              בחר ליקויים מהרשימה ← צרף הערה ותמונה לכל ליקוי
            </div>

            {tourData.viols.length > 0 && (
              <div className="card" style={{borderColor:"#fdba74",background:"#fff7ed"}}>
                <div style={{fontWeight:800,color:"#9a3412",borderBottom:"1px solid #fed7aa",paddingBottom:8,marginBottom:12,fontSize:14}}>
                  🔴 ליקויים שנבחרו ({tourData.viols.length}) | סה"כ: ₪{tourTotal.toLocaleString()}
                </div>
                {tourData.viols.map(v=>(
                  <div key={v.id} style={{background:"#fff",borderRadius:10,padding:12,marginBottom:10,border:"1px solid #fed7aa",boxShadow:"0 1px 4px rgba(0,0,0,.05)"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                      <span style={{fontWeight:700,fontSize:13,color:"#1e293b"}}>{v.label}</span>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <span style={{background:"#dc2626",color:"#fff",borderRadius:6,padding:"3px 9px",fontSize:12,fontWeight:700}}>₪{v.fine.toLocaleString()}</span>
                        <button onClick={()=>setTourData(p=>({...p,viols:p.viols.filter(x=>x.id!==v.id)}))} style={{background:"#fee2e2",color:"#dc2626",border:"none",borderRadius:6,padding:"4px 8px",cursor:"pointer",fontWeight:700,fontFamily:"Heebo,sans-serif"}}>✕</button>
                      </div>
                    </div>
                    <textarea value={v.note} onChange={e=>updateViol(v.id,'note',e.target.value)} placeholder="הערה לליקוי..." rows={2} style={{marginBottom:8,fontSize:13}} />
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <label htmlFor={`file-cam-${v.id}`} style={{background:"#e2e8f0",color:"#475569",padding:"6px 14px",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>
                        📷 מצלמה
                      </label>
                      <label htmlFor={`file-gal-${v.id}`} style={{background:"#dbeafe",color:"#1e40af",padding:"6px 14px",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>
                        🖼️ גלריה
                      </label>
                      <input type="file" accept="image/*" capture="environment" onChange={e=>handleImageUpload(v.id,e)} style={{display:"none"}} id={`file-cam-${v.id}`} />
                      <input type="file" accept="image/*" onChange={e=>handleImageUpload(v.id,e)} style={{display:"none"}} id={`file-gal-${v.id}`} />
                      {v.image && <img src={v.image} className="img-preview" />}
                    </div>
                  </div>
                ))}
              </div>
            )}

            {Object.entries(DB).map(([key,cat])=>{
              const isCollapsed = collapsedCats[key];
              const toggleCat = () => setCollapsedCats(p=>({...p,[key]:!p[key]}));
              return (
              <div key={key} className="card" style={{padding:0,overflow:"hidden"}}>
                <div onClick={toggleCat} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 18px",cursor:"pointer",background:"#fff",borderBottom:isCollapsed?"none":"1.5px solid #e2e8f0",userSelect:"none"}}>
                  <span style={{fontWeight:800,fontSize:15,color:"#0f2556"}}>{cat.title}</span>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontSize:12,color:"#94a3b8",fontWeight:600}}>{cat.items.length} סעיפים</span>
                    <span style={{fontSize:18,color:"#2563eb",fontWeight:700,lineHeight:1,transform:isCollapsed?"rotate(0deg)":"rotate(180deg)",transition:"transform .2s",display:"inline-block"}}>⌄</span>
                  </div>
                </div>
                {!isCollapsed && (
                  <div style={{padding:"0 18px 8px"}}>
                    {cat.items.map(item=>(
                      <div key={item.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:"1px solid #f1f5f9"}}>
                        <span style={{fontWeight:600,fontSize:13,color:"#334155",flex:1,paddingLeft:8}}>{item.label}</span>
                        <div style={{display:"flex",gap:6,flexShrink:0}}>
                          {item.h===item.o
                            ? <button onClick={()=>addViol(item,'h')} style={{background:"#dbeafe",color:"#1e40af",border:"none",borderRadius:6,padding:"5px 12px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>הוסף ₪{item.h.toLocaleString()}</button>
                            : <>
                                <button onClick={()=>addViol(item,'o')} style={{background:"#fff7ed",color:"#c2410c",border:"1px solid #fed7aa",borderRadius:6,padding:"5px 10px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>פגום ₪{item.o.toLocaleString()}</button>
                                <button onClick={()=>addViol(item,'h')} style={{background:"#fef2f2",color:"#dc2626",border:"1px solid #fca5a5",borderRadius:6,padding:"5px 10px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>חסר ₪{item.h.toLocaleString()}</button>
                              </>
                          }
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
              );
            })}
          </div>
        )}

        {/* ── TAB: MEETINGS ── */}
        {tab==="meetings" && <MeetingsTab meetings={meetings} onSave={saveMeeting} section={section} />}

        {/* ── TAB: STATS ── */}
        {/* ── TAB: ARCHIVE ── */}
        {tab==="archive" && (
          <div style={{background:"#f5f0e8",minHeight:"80vh",margin:"-14px -12px",padding:"16px 12px"}}>
            {/* כותרת */}
            <div style={{textAlign:"center",padding:"12px 0 16px",borderBottom:"2px solid #c9b99a",marginBottom:16}}>
              <div style={{fontSize:20,fontWeight:700,color:"#3d2b1f"}}>📁 ארכיון דוחות</div>
              <div style={{fontSize:12,color:"#7a5c45",marginTop:2}}>אהוד לויתן הנדסה — פיקוח ובקרה</div>
            </div>

            {/* סינון מקטע */}
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>
              {['הכל',...SECTIONS].map(s=>(
                <button key={s} onClick={()=>setArchiveFilter(s==='הכל'?'all':s)}
                  style={{padding:"5px 14px",borderRadius:20,border:"1px solid #c9b99a",
                    background:archiveFilter===(s==='הכל'?'all':s)?"#7a5c45":"#ede7d9",
                    color:archiveFilter===(s==='הכל'?'all':s)?"#f5f0e8":"#5a3e2b",
                    fontSize:12,cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>
                  {s}
                </button>
              ))}
            </div>

            {/* ריק */}
            {history.filter(h=>h.type==='tour').length === 0 && (
              <div style={{textAlign:"center",color:"#7a5c45",padding:"60px 0"}}>
                <div style={{fontSize:40,marginBottom:8}}>📁</div>
                <div style={{fontSize:15}}>אין דוחות שמורים עדיין</div>
              </div>
            )}

            {/* קיבוץ לפי חודש → שבוע → יום */}
            {(()=>{
              const tours = history
                .filter(h=>h.type==='tour' && (archiveFilter==='all'||h.section===archiveFilter))
                .sort((a,b)=>new Date(b.date)-new Date(a.date));

              if(tours.length===0) return <div style={{textAlign:"center",color:"#7a5c45",padding:"40px 0",fontSize:13}}>אין דוחות למקטע זה</div>;

              const getWeek = (dateStr) => {
                if(!dateStr) return 0;
                const d = new Date(dateStr);
                const jan1 = new Date(d.getFullYear(),0,1);
                return Math.ceil(((d-jan1)/86400000+jan1.getDay()+1)/7);
              };
              const getMonthKey = (dateStr) => {
                if(!dateStr) return '';
                const [y,m] = dateStr.split('-');
                const months = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
                return `${months[parseInt(m)-1]} ${y}`;
              };
              const fmtDate = (d) => {
                if(!d) return '—';
                const [y,m,dd] = d.split('-');
                const days = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
                const dayName = days[new Date(d).getDay()];
                return `יום ${dayName} ${dd}/${m}/${y}`;
              };

              // קיבוץ
              const byMonth = {};
              tours.forEach(h=>{
                const mk = getMonthKey(h.date);
                const wk = `שבוע ${getWeek(h.date)}`;
                const dk = h.date||'—';
                if(!byMonth[mk]) byMonth[mk]={};
                if(!byMonth[mk][wk]) byMonth[mk][wk]={};
                if(!byMonth[mk][wk][dk]) byMonth[mk][wk][dk]=[];
                byMonth[mk][wk][dk].push(h);
              });

              return Object.entries(byMonth).map(([month,weeks])=>{
                const monthOpen = !collapsedCats['m_'+month];
                const totalMonth = Object.values(weeks).flatMap(w=>Object.values(w).flat()).length;
                return (
                  <div key={month} style={{marginBottom:12}}>
                    {/* חודש */}
                    <div onClick={()=>setCollapsedCats(p=>({...p,['m_'+month]:!p['m_'+month]}))}
                      style={{background:"#d4c4a8",borderRadius:monthOpen?"8px 8px 0 0":"8px",padding:"9px 14px",
                        fontSize:13,fontWeight:700,color:"#3d2b1f",cursor:"pointer",
                        display:"flex",justifyContent:"space-between",border:"1px solid #c9b99a",userSelect:"none"}}>
                      <span>📅 {month}</span>
                      <span style={{fontSize:12,color:"#7a5c45"}}>{monthOpen?"▲":"▼"} {totalMonth} דוחות</span>
                    </div>

                    {monthOpen && Object.entries(weeks).map(([week,days])=>{
                      const weekOpen = !collapsedCats['w_'+month+week];
                      const totalWeek = Object.values(days).flat().length;
                      return (
                        <div key={week} style={{borderRight:"3px solid #c9b99a",marginRight:8,background:"#ede7d9"}}>
                          {/* שבוע */}
                          <div onClick={()=>setCollapsedCats(p=>({...p,['w_'+month+week]:!p['w_'+month+week]}))}
                            style={{padding:"7px 12px",fontSize:12,color:"#7a5c45",cursor:"pointer",
                              display:"flex",justifyContent:"space-between",borderBottom:"1px solid #e0d5c0",userSelect:"none"}}>
                            <span>{week}</span>
                            <span>{weekOpen?"▲":"▼"} {totalWeek} דוחות</span>
                          </div>

                          {weekOpen && Object.entries(days).sort((a,b)=>new Date(b[0])-new Date(a[0])).map(([day,reports])=>{
                            const dayOpen = !collapsedCats['d_'+day];
                            return (
                              <div key={day} style={{borderBottom:"1px solid #e0d5c0"}}>
                                {/* יום */}
                                <div onClick={()=>setCollapsedCats(p=>({...p,['d_'+day]:!p['d_'+day]}))}
                                  style={{padding:"6px 16px",fontSize:12,fontWeight:700,color:"#5a3e2b",
                                    cursor:"pointer",display:"flex",justifyContent:"space-between",
                                    background:"#f0ead9",userSelect:"none"}}>
                                  <span>{fmtDate(day)}</span>
                                  <span style={{color:"#7a5c45"}}>{dayOpen?"▲":"▼"} {reports.length} דוחות</span>
                                </div>

                                {dayOpen && reports.map((h,i)=>(
                                  <div key={h.id||i}>
                                    {/* שורת דוח */}
                                    <div onClick={()=>setSelectedReport(selectedReport?.id===h.id?null:h)}
                                      style={{padding:"8px 20px",fontSize:12,color:"#3d2b1f",
                                        display:"flex",justifyContent:"space-between",alignItems:"center",
                                        borderBottom:"1px solid #e8e0cc",background:"#faf7f2",cursor:"pointer"}}>
                                      <span>🏗️ מקטע {h.section} | {h.time||'—'}</span>
                                      <div style={{display:"flex",gap:6,alignItems:"center"}}>
                                        {h.data?.viols?.length>0
                                          ? <span style={{padding:"2px 8px",borderRadius:10,fontSize:11,background:"#f0d8cc",color:"#7a3020"}}>{h.data.viols.length} ליקויים</span>
                                          : <span style={{padding:"2px 8px",borderRadius:10,fontSize:11,background:"#d4eac8",color:"#2d5a1b"}}>ללא ליקויים</span>
                                        }
                                        <span style={{fontSize:11,color:"#7a5c45"}}>{selectedReport?.id===h.id?"▲":"▼"}</span>
                                      </div>
                                    </div>

                                    {/* פרטי דוח מורחב */}
                                    {selectedReport?.id===h.id && (
                                      <div style={{background:"#fff8f0",padding:"12px 20px",borderBottom:"1px solid #e8e0cc"}}>
                                        {h.data?.workDesc && (
                                          <div style={{marginBottom:10,fontSize:13,color:"#3d2b1f"}}>
                                            <strong>תיאור עבודה:</strong> {h.data.workDesc}
                                          </div>
                                        )}
                                        {h.data?.viols?.length>0 && (
                                          <div style={{marginBottom:10}}>
                                            <div style={{fontWeight:700,fontSize:13,color:"#7a3020",marginBottom:6}}>ליקויים:</div>
                                            {h.data.viols.map((v,j)=>(
                                              <div key={j} style={{background:"#fef2f2",borderRadius:8,padding:"8px 12px",marginBottom:6,fontSize:12}}>
                                                <div style={{fontWeight:700,color:"#3d2b1f"}}>{v.label}</div>
                                                {v.note && <div style={{color:"#7a5c45",marginTop:2}}>{v.note}</div>}
                                                <div style={{color:"#7a3020",fontWeight:700,marginTop:2}}>₪{(v.fine||0).toLocaleString()}</div>
                                                {v.image && <img src={v.image} style={{maxWidth:"100%",borderRadius:6,marginTop:6}} />}
                                              </div>
                                            ))}
                                            <div style={{fontWeight:700,color:"#7a3020",fontSize:13,marginTop:6}}>
                                              סה"כ: ₪{h.data.viols.reduce((a,v)=>a+(v.fine||0),0).toLocaleString()}
                                            </div>
                                          </div>
                                        )}
                                        <div style={{display:"flex",gap:8,marginTop:8}}>
                                        <button onClick={(e)=>{e.stopPropagation();doExportSingle(h);}}
                                          style={{flex:1,background:"#3d2b1f",color:"#f5f0e8",border:"none",borderRadius:8,
                                            padding:"8px 16px",fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>
                                          📥 ייצא HTML
                                        </button>
                                        <button onClick={(e)=>{
                                          e.stopPropagation();
                                          setEditingReport(h);
                                          setTourData(h.data||emptyTour());
                                          setSection(h.section||section);
                                          setTab('status');
                                        }}
                                          style={{flex:1,background:"#2563eb",color:"#fff",border:"none",borderRadius:8,
                                            padding:"8px 16px",fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>
                                          ✏️ ערוך דוח
                                        </button>
                                        <button onClick={(e)=>{e.stopPropagation();deleteReport(h);}}
                                          style={{background:"#dc2626",color:"#fff",border:"none",borderRadius:8,
                                            padding:"8px 12px",fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>
                                          🗑️
                                        </button>
                                        </div>
                                      </div>
                                    )}
                                  </div>
                                ))}
                              </div>
                            );
                          })}
                        </div>
                      );
                    })}
                  </div>
                );
              });
            })()}
          </div>
        )}

        {tab==="stats" && (
          <div>
            <div className="card">
              <div style={{fontWeight:800,color:"#0f2556",fontSize:15,marginBottom:16,textAlign:"center"}}>📊 נתונים מצטברים — כל המקטעים</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                {[
                  {val:history.filter(h=>h.type==='tour').length, label:"סיורים בוצעו", bg:"#eff6ff", clr:"#1d4ed8"},
                  {val:meetings.length, label:"ישיבות תועדו", bg:"#f5f3ff", clr:"#7c3aed"},
                  {val:history.filter(h=>h.type==='tour').reduce((a,h)=>a+(h.data?.viols?.length||0),0), label:"ליקויים נרשמו", bg:"#fef2f2", clr:"#dc2626"},
                  {val:"₪"+history.filter(h=>h.type==='tour').reduce((a,h)=>a+(h.data?.viols?.reduce((s,v)=>s+v.fine,0)||0),0).toLocaleString(), label:"קנסות מצטבר", bg:"#fff7ed", clr:"#ea580c"},
                ].map((item,i)=>(
                  <div key={i} style={{background:item.bg,borderRadius:12,padding:"16px 14px",textAlign:"center"}}>
                    <div style={{fontSize:26,fontWeight:900,color:item.clr}}>{item.val}</div>
                    <div style={{fontSize:12,fontWeight:600,color:"#64748b",marginTop:4}}>{item.label}</div>
                  </div>
                ))}
              </div>
            </div>
            <div className="card">
              <div style={{fontWeight:700,fontSize:14,color:"#374151",marginBottom:12,textAlign:"center"}}>ייצוא ארכיון מלא</div>
              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>doExport(true)} style={{flex:1,background:"#1d4ed8",color:"#fff",border:"none",borderRadius:10,padding:"12px",fontWeight:800,fontSize:14,cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>📄 הפק דוח (HTML)</button>
              </div>
            </div>
          </div>
        )}
      </div>

      {/* BOTTOM BAR */}
      {(tab==='status'||tab==='violations') && (
        <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#fff",borderTop:"1.5px solid #e2e8f0",padding:"10px 16px",boxShadow:"0 -6px 20px rgba(0,0,0,.08)",zIndex:40}}>
          <div style={{maxWidth:680,margin:"0 auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <span style={{fontWeight:700,fontSize:13,color:"#64748b"}}>
                {tab === 'violations' && (
                  <>סה"כ ליקויים: <span style={{color:"#dc2626",fontSize:16,fontWeight:900}}>₪{tourTotal.toLocaleString()}</span></>
                )}
              </span>
              <button onClick={()=>{if(confirm('לנקות את כל נתוני הסיור?'))setTourData(emptyTour())}} style={{fontSize:12,color:"#94a3b8",background:"none",border:"none",cursor:"pointer",fontFamily:"Heebo,sans-serif",textDecoration:"underline"}}>נקה נתונים</button>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>doExport(false)} style={{flex:1,background:"#0f2556",color:"#fff",border:"none",borderRadius:10,padding:"12px",fontWeight:800,fontSize:14,cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>📥 הפק דוח (HTML)</button>
              <button onClick={saveTour} style={{flex:1,background:editingReport?"#2563eb":"#16a34a",color:"#fff",border:"none",borderRadius:10,padding:"12px",fontWeight:800,fontSize:14,cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>{editingReport?"💾 שמור שינויים":"✅ שמור לארכיון"}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════
       MEETINGS TAB
═══════════════════════════════ */
function MeetingsTab({meetings, onSave, section}) {
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({date:todayStr(), time:"", subject:"", summary:"", decisions:"", nextSteps:"", participants:[]});
  const list = meetings.filter(m=>m.section===section);
  const toggleP = p => setForm(f=>({...f, participants:f.participants.includes(p)?f.participants.filter(x=>x!==p):[...f.participants,p]}));

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div style={{fontWeight:800,fontSize:16,color:"#4c1d95"}}>📝 ישיבות וסיכומי שיחות</div>
        <button onClick={()=>setShowForm(!showForm)} style={{background:"#7c3aed",color:"#fff",border:"none",borderRadius:8,padding:"8px 16px",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>+ ישיבה חדשה</button>
      </div>

      {showForm && (
        <div className="card" style={{borderColor:"#c4b5fd",borderWidth:2}}>
          <div style={{marginBottom:12}}><span className="section-label">נושא</span><input value={form.subject} onChange={e=>setForm(f=>({...f,subject:e.target.value}))} placeholder="נושא הישיבה..." /></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
            <div><span className="section-label">תאריך</span><input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} /></div>
            <div><span className="section-label">שעה</span><input type="time" value={form.time} onChange={e=>setForm(f=>({...f,time:e.target.value}))} /></div>
          </div>
          <div style={{marginBottom:10}}>
            <span className="section-label">משתתפים פיקוח</span>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {SUP_ROLES.map(r=><button key={r} onClick={()=>toggleP(r)} className={`chip ${form.participants.includes(r)?"active":""}`}>{r}</button>)}
            </div>
          </div>
          <div style={{marginBottom:12}}>
            <span className="section-label">משתתפים קבלן</span>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {CON_ROLES.map(r=><button key={r} onClick={()=>toggleP("קבלן: "+r)} className={`chip ${form.participants.includes("קבלן: "+r)?"active":""}`}>{r}</button>)}
            </div>
          </div>
          <div style={{marginBottom:10}}><span className="section-label">סיכום הדיון</span><textarea value={form.summary} onChange={e=>setForm(f=>({...f,summary:e.target.value}))} rows={2} /></div>
          <div style={{marginBottom:10}}><span className="section-label">החלטות</span><textarea value={form.decisions} onChange={e=>setForm(f=>({...f,decisions:e.target.value}))} rows={2} /></div>
          <div style={{marginBottom:14}}><span className="section-label">צעדים הבאים</span><textarea value={form.nextSteps} onChange={e=>setForm(f=>({...f,nextSteps:e.target.value}))} rows={2} /></div>
          <button onClick={()=>{if(!form.subject)return alert("חסר נושא"); onSave(form); setShowForm(false); setForm({date:todayStr(),time:"",subject:"",summary:"",decisions:"",nextSteps:"",participants:[]});}}
            style={{width:"100%",background:"#7c3aed",color:"#fff",border:"none",borderRadius:10,padding:"12px",fontWeight:800,fontSize:15,cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>שמור ישיבה</button>
        </div>
      )}

      {list.length===0 && !showForm && (
        <div style={{textAlign:"center",color:"#94a3b8",padding:"60px 0"}}>
          <div style={{fontSize:40,marginBottom:8}}>📝</div>
          <div style={{fontSize:15}}>אין ישיבות מתועדות במקטע זה</div>
        </div>
      )}

      {list.map(m=>(
        <div key={m.id} className="card" style={{borderRight:"4px solid #7c3aed"}}>
          <div style={{fontWeight:700,fontSize:15,color:"#1e293b",marginBottom:4}}>{m.subject||m.data?.subject}</div>
          <div style={{fontSize:12,color:"#64748b",marginBottom:8}}>{m.date} | {m.time||'—'}</div>
          <div style={{fontSize:13,background:"#f5f3ff",padding:"8px 12px",borderRadius:8,color:"#4c1d95"}}>
            <strong>משתתפים:</strong> {(m.participants||m.data?.participants||[]).join(' | ')}
          </div>
        </div>
      ))}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
